# Codecov configuration for pg_tre.
# https://docs.codecov.com/docs/codecovyml-reference
#
# Wired up but not yet active — the project does not have a
# codecov upload step in CI as of v1.1.x. When ready, add a
# coverage job to .github/workflows/ci.yml that runs
# `make coverage` (added to Makefile in the same release as this
# file) and uploads `coverage.info` to codecov.

coverage:
  precision: 2
  round: down
  range: "50...90"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
    patch:
      default:
        informational: true

# Ignore non-product code in coverage reports.
ignore:
  - "test/**"
  - "bench/**"
  - "fuzz/**"
  - "vendor/**"
  - "src/util/sparsemap.c"     # vendored
  - "include/pg_tre/sparsemap.h"
  - "src/query/tre_grammar.c"  # generated by Lime
  - "src/query/tre_grammar.h"

# Comment settings for PRs.
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
