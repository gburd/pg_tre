# ASAN + UBSAN regression on every push to main.
#
# We do NOT apply the PostgreSQL memory-context instrumentation
# patch that pg_textsearch ships (poison/unpoison around aset.c
# alloc/free).  Without it, ASAN catches direct use-after-free,
# out-of-bounds reads/writes, double-free, and undefined-behavior
# arithmetic in pg_tre code, but does not catch
# memory-context-internal issues like writing to a chunk after
# its context has been reset (those just look like writes to
# valid memory until ASAN sees the context's free list reuse it,
# at which point the reproducer is harder to read).
#
# The instrumentation patch is tracked as a Tier-3 followup in
# .agent/notes/community-readiness-followups.md.  When it lands,
# this workflow gains the patch step and starts catching the full
# set.
name: Sanitizer test

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'test/**'
      - 'sql/**'
      - 'Makefile'
      - 'pg_tre.control'
      - '.github/workflows/sanitizer-build-and-test.yml'
  workflow_dispatch:

env:
  PG_SRC_DIR: pgbuild
  PG_INSTALL_DIR: postgresql
  CC: clang-18
  CXX: clang++-18
  CFLAGS:   "-g -fsanitize=address,undefined -fno-omit-frame-pointer -Og -fno-inline-functions"
  CXXFLAGS: "-g -fsanitize=address,undefined -fno-omit-frame-pointer -Og -fno-inline-functions"
  LDFLAGS:  "-fsanitize=address,undefined"

  # detect_leaks=0 because PostgreSQL deliberately leaks
  # transaction-lifetime allocations into top-level contexts;
  # the LSAN suppressions in test/lsan.supp need refinement
  # before we can turn leak detection on.
  ASAN_OPTIONS: >-
    detect_leaks=0
    abort_on_error=1
    exitcode=27
    log_path=${{ github.workspace }}/sanitizer_logs/asan
    print_stacktrace=1
    check_initialization_order=1
  UBSAN_OPTIONS: >-
    halt_on_error=1
    exitcode=27
    print_stacktrace=1
    log_path=${{ github.workspace }}/sanitizer_logs/ubsan
    print_summary=1

jobs:
  sanitizer:
    name: PG${{ matrix.pg }} sanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Informational, non-blocking.  This job builds *all of PostgreSQL*
    # from source with -fsanitize=address,undefined and then exercises
    # pg_tre inside it.  On the current GitHub ubuntu-24.04 runner the
    # ASan-instrumented `postgres --boot` aborts during initdb's own
    # bootstrap -- before any pg_tre code is loaded -- even with ASLR
    # disabled (vm.mmap_rnd_bits=28 + kernel.randomize_va_space=0).
    # That is a PostgreSQL-under-ASan toolchain/runner-environment
    # problem, not a pg_tre defect, and this job has never gone green.
    # Kept for its diagnostic artifact while a known-good ASan+PG
    # recipe is sorted out; see .agent/notes (ci-asan-followup).  Do
    # not let it gate the build.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        pg: ["18.3"]

    steps:
      - name: Lower ASLR entropy for AddressSanitizer (Ubuntu 24.04 runner)
        # Ubuntu 24.04 runners ship a kernel whose default
        # vm.mmap_rnd_bits (32) exceeds what ASan's shadow-memory
        # mapping supports, so every ASan-instrumented binary aborts
        # at startup with "Aborted (core dumped)" before any user code
        # runs (no ASan report is written -- the runtime can't map its
        # shadow region).  Lowering mmap_rnd_bits is the documented
        # workaround; on the newest runner kernels that is still not
        # enough, so we also disable ASLR outright for the job.  Both
        # are kernel-global and persist across subsequent steps.
        run: |
          sudo sysctl -w vm.mmap_rnd_bits=28
          sudo sysctl -w kernel.randomize_va_space=0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flex bison build-essential libssl-dev libreadline-dev \
            zlib1g-dev libicu-dev pkg-config \
            systemd-coredump gdb \
            clang-18 llvm-18 lcov \
            autoconf automake libtool gettext autopoint m4

      - name: Checkout pg_tre
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create sanitizer logs directory
        run: mkdir -p ${{ github.workspace }}/sanitizer_logs

      - name: Cache PostgreSQL ${{ matrix.pg }}
        id: cache-postgresql
        uses: actions/cache@v4
        with:
          path: ~/${{ env.PG_INSTALL_DIR }}
          key: pg-asan-${{ matrix.pg }}-${{ env.CC }}-${{ hashFiles('.github/workflows/sanitizer-build-and-test.yml') }}

      - name: Build PostgreSQL ${{ matrix.pg }} with sanitizers
        if: steps.cache-postgresql.outputs.cache-hit != 'true'
        run: |
          wget -q -O postgresql.tar.bz2 \
            https://ftp.postgresql.org/pub/source/v${{ matrix.pg }}/postgresql-${{ matrix.pg }}.tar.bz2
          mkdir -p ~/${{ env.PG_SRC_DIR }}
          tar --extract --file postgresql.tar.bz2 \
            --directory ~/${{ env.PG_SRC_DIR }} --strip-components 1
          cd ~/${{ env.PG_SRC_DIR }}
          ./configure \
            --prefix=$HOME/${{ env.PG_INSTALL_DIR }} \
            --without-icu \
            --without-readline \
            --without-zlib \
            CC="${{ env.CC }}" \
            CFLAGS="${{ env.CFLAGS }}" \
            LDFLAGS="${{ env.LDFLAGS }}"
          make -j$(nproc)
          make install

      - name: Build pg_tre with sanitizers
        run: |
          export PATH=$HOME/${{ env.PG_INSTALL_DIR }}/bin:$PATH
          # PG_CFLAGS is passed through to the extension build by
          # pgxs; CFLAGS is overridden by pgxs's own defaults.
          # SHLIB_LINK must keep the vendored TRE archive + -lm and
          # merely add the sanitizer flags -- replacing it with only
          # the asan flags drops libtre.a and yields a pg_tre.so with
          # an undefined tre_regerror symbol.
          make clean
          make PG_CFLAGS="${{ env.CFLAGS }}" \
               SHLIB_LINK="vendor/tre/lib/.libs/libtre.a -lm ${{ env.LDFLAGS }}" \
               PG_CONFIG=$HOME/${{ env.PG_INSTALL_DIR }}/bin/pg_config

      - name: Install pg_tre
        run: |
          export PATH=$HOME/${{ env.PG_INSTALL_DIR }}/bin:$PATH
          make install \
               PG_CONFIG=$HOME/${{ env.PG_INSTALL_DIR }}/bin/pg_config

      - name: Set up cluster with sanitizers
        run: |
          export PATH=$HOME/${{ env.PG_INSTALL_DIR }}/bin:$PATH
          export PGDATA=/tmp/pgdata_asan
          initdb -D "$PGDATA" --auth-local=trust --auth-host=trust
          {
            echo "shared_preload_libraries = 'pg_tre'"
            echo "shared_buffers = 128MB"
            echo "port = 5432"
            echo "unix_socket_directories = '/tmp'"
            # Reduce noise from the autovacuum launcher, which
            # otherwise generates LSAN reports on background-worker
            # exit that are unrelated to pg_tre.
            echo "autovacuum = off"
            echo "log_min_messages = warning"
          } >> "$PGDATA/postgresql.conf"
          pg_ctl -D "$PGDATA" start -w -l "$PGDATA/logfile"
          createdb -h /tmp contrib_regression
          pg_ctl -D "$PGDATA" stop -w -m fast

      - name: Run regression tests under ASAN+UBSAN
        run: |
          export PATH=$HOME/${{ env.PG_INSTALL_DIR }}/bin:$PATH
          export PGHOST=/tmp PGPORT=5432
          export PGDATA=/tmp/pgdata_asan
          pg_ctl -D "$PGDATA" start -w -l "$PGDATA/logfile"
          PG_CONFIG=$HOME/${{ env.PG_INSTALL_DIR }}/bin/pg_config \
              bash scripts/run-regress.sh
          pg_ctl -D "$PGDATA" stop -w -m fast

      - name: Check for sanitizer reports
        run: |
          if ls ${{ github.workspace }}/sanitizer_logs/*.* >/dev/null 2>&1; then
              echo "::error::Sanitizer reports detected"
              for f in ${{ github.workspace }}/sanitizer_logs/*.*; do
                  echo "::group::$(basename $f)"
                  cat "$f"
                  echo "::endgroup::"
              done
              exit 1
          fi

      - name: Diagnostics on failure
        if: failure()
        run: |
          if [ -f /tmp/pgdata_asan/logfile ]; then
              echo "::group::PostgreSQL log"
              tail -200 /tmp/pgdata_asan/logfile
              echo "::endgroup::"
          fi
          ls -la /tmp/pgdata_asan/ || true

      - name: Upload sanitizer reports as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs-pg${{ matrix.pg }}
          path: ${{ github.workspace }}/sanitizer_logs/
          retention-days: 14
