name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build-and-test:
    name: build PG${{ matrix.pg }} / ${{ matrix.cc }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        pg: ['18']
        cc: [gcc, clang]
        exclude:
          - os: macos-14
            cc: gcc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              autoconf automake libtool gettext autopoint m4 \
              build-essential postgresql-server-dev-${{ matrix.pg }} \
              postgresql-${{ matrix.pg }} clang

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool gettext m4 postgresql@${{ matrix.pg }}
          echo "/opt/homebrew/opt/postgresql@${{ matrix.pg }}/bin" >> "$GITHUB_PATH"

      - name: Build
        env:
          CC: ${{ matrix.cc }}
        run: PG_CONFIG=$(which pg_config) make

      - name: Install
        run: sudo PG_CONFIG=$(which pg_config) make install

      - name: Start PostgreSQL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo systemctl start postgresql@${{ matrix.pg }}-main || \
              sudo service postgresql start
          sudo -u postgres psql -c "ALTER SYSTEM SET shared_preload_libraries = 'pg_tre';"
          sudo systemctl restart postgresql@${{ matrix.pg }}-main || \
              sudo service postgresql restart
          sudo -u postgres createdb "$USER"

      - name: Run regression tests
        run: |
          PG_CONFIG=$(which pg_config) make localcheck || \
              PG_CONFIG=$(which pg_config) make check

      - name: Upload regression artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.os }}-${{ matrix.cc }}-pg${{ matrix.pg }}
          path: test/results/
          retention-days: 14

  lint-docs:
    name: lint & validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install lint deps
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm
          sudo npm install -g markdownlint-cli

      - name: Lint Markdown
        continue-on-error: true
        run: |
          if [ -f .markdownlint.json ]; then
              markdownlint '**/*.md' \
                  --ignore vendor --ignore build --ignore bench/corpus.csv
          else
              echo "No .markdownlint.json; skipping"
          fi

      - name: Verify no committed binary artifacts
        run: |
          if git ls-files | grep -E '\.(o|so|dylib|a)$' ; then
              echo "FAIL: committed binary artifacts"
              exit 1
          fi

      - name: Verify STATUS.md is populated
        run: |
          test -s STATUS.md && grep -q "Phase" STATUS.md

      - name: Check all README doc links resolve
        run: |
          # A soft lint: fail the job only if README references
          # a local path that doesn't exist.
          grep -oE '\]\(([^)]+)\)' README.md \
              | sed -e 's/^](\(.*\))$/\1/' \
              | while read ref; do
                  case "$ref" in
                      http*|mailto:*|\#*) continue ;;
                  esac
                  if [ ! -e "$ref" ]; then
                      echo "MISSING: $ref (referenced in README.md)"
                      exit 1
                  fi
              done

  publish-docs:
    name: publish docs to GitHub Pages
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-docs]
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp -r doc _site/
          cp CHANGELOG.md STATUS.md _site/ || true
          # If a static site generator is configured later, this is
          # where mdbook/docusaurus/mkdocs would run.

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release-artifacts:
    name: build release tarball
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, lint-docs]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dist deps
        run: sudo apt-get update && sudo apt-get install -y make tar gzip

      - name: Build distribution tarball
        run: make dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pg_tre-*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') }}
          generate_release_notes: true
